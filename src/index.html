<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Proyectos</title>
    <style>
      :root {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: #162033;
        background: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #f5f7fb;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
        padding: 32px;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .page-title {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
      }

      .page-subtitle {
        margin: 6px 0 0;
        color: #667085;
      }

      .primary-button {
        border: 0;
        border-radius: 10px;
        padding: 11px 18px;
        color: #ffffff;
        background: #2563eb;
        cursor: not-allowed;
        opacity: 0.72;
      }

      .status-card {
        border: 1px solid #e4e7ec;
        border-radius: 14px;
        padding: 28px;
        background: #ffffff;
        box-shadow: 0 4px 14px rgb(16 24 40 / 6%);
      }

      .status-card h2 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 20px;
      }

      .status-card p {
        margin: 0;
        color: #667085;
        line-height: 1.6;
      }

      .technical-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        padding: 8px 11px;
        border-radius: 999px;
        color: #067647;
        background: #ecfdf3;
        font-size: 14px;
        font-weight: 600;
      }

      .technical-status::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #12b76a;
        content: "";
      }

      .app-version {
        margin-top: 18px;
        color: #98a2b3;
        font-size: 12px;
      }

      @media (max-width: 720px) {
        .app-shell {
          padding: 20px;
        }

        .page-header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <h1 class="page-title">Proyectos</h1>
          <p class="page-subtitle">Gestiona tus proyectos, avances y documentos.</p>
        </div>
        <button class="primary-button" type="button" disabled>Nuevo proyecto</button>
      </header>

      <section class="status-card" aria-labelledby="initial-status-title">
        <h2 id="initial-status-title">Comunicación local lista</h2>
        <p>
          Electron, los canales IPC y SQLite están conectados de forma segura. El
          siguiente bloque incorporará el diseño visual y los componentes reutilizables.
        </p>
        <div class="technical-status" id="technical-status" role="status">
          Comprobando servicios locales
        </div>
        <div class="app-version" id="app-version"></div>
      </section>
    </main>

    <script src="./services/ipc-service.js" defer></script>
    <script src="./modules/proyectos/proyectos-service.js" defer></script>
    <script src="./modules/proyectos/proyectos-state.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
